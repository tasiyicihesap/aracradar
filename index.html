<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AraçRadar Hub</title>
<meta name="description" content="AraçRadar araç paneli — tüm araçlarınız tek yerde">
<meta name="theme-color" content="#0c1117">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1117;          /* gece asfaltı */
  --panel:#151c25;       /* gösterge paneli */
  --panel2:#1b2430;
  --cizgi:#27313f;       /* şerit çizgisi */
  --metin:#e8edf3;
  --soluk:#8b97a6;
  --radar:#35e08c;       /* radar yeşili */
  --radar-soluk:rgba(53,224,140,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--metin);min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(53,224,140,.07), transparent);
  padding:0 16px calc(24px + env(safe-area-inset-bottom));
}
.sarici{max-width:680px;margin:0 auto}

/* ÜST: radar logosu */
header{display:flex;align-items:center;gap:14px;padding:26px 0 6px}
.radar{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;position:relative;
  border:2px solid var(--radar);
  background:
    radial-gradient(circle, transparent 38%, rgba(53,224,140,.18) 39%, transparent 41%),
    radial-gradient(circle, transparent 64%, rgba(53,224,140,.18) 65%, transparent 67%),
    var(--radar-soluk);
  overflow:hidden;
}
.radar::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg, rgba(53,224,140,.55), transparent 70deg);
  animation:tara 3.4s linear infinite;
}
.radar::after{
  content:'';position:absolute;width:5px;height:5px;border-radius:50%;
  background:var(--radar);top:30%;left:62%;
  box-shadow:0 0 8px var(--radar);
  animation:nokta 3.4s linear infinite;
}
@keyframes tara{to{transform:rotate(360deg)}}
@keyframes nokta{0%,8%{opacity:1}30%,100%{opacity:.15}}
@media (prefers-reduced-motion: reduce){.radar::before,.radar::after{animation:none}}
h1{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:2rem;
  letter-spacing:.04em;line-height:1;
}
h1 span{color:var(--radar)}
.alt-baslik{color:var(--soluk);font-size:.85rem;margin-top:3px}

/* durum çubuğu */
.durum{
  display:flex;align-items:center;gap:8px;margin:14px 0 22px;
  font-size:.78rem;color:var(--soluk);
}
.durum .isik{width:7px;height:7px;border-radius:50%;background:var(--radar);box-shadow:0 0 6px var(--radar)}
.durum.cevrimdisi .isik{background:#e0a435;box-shadow:0 0 6px #e0a435}

/* araç kartları */
.kartlar{display:flex;flex-direction:column;gap:12px}
.kart{
  display:flex;align-items:center;gap:16px;
  background:var(--panel);border:1px solid var(--cizgi);border-radius:14px;
  padding:16px 18px;text-decoration:none;color:var(--metin);
  transition:transform .14s, border-color .14s, background .14s;
  position:relative;overflow:hidden;
}
.kart::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--kart-renk,var(--radar));opacity:.85;
}
.kart:hover,.kart:focus-visible{
  transform:translateY(-2px);border-color:var(--kart-renk,var(--radar));
  background:var(--panel2);outline:none;
}
.kart:focus-visible{box-shadow:0 0 0 2px var(--kart-renk,var(--radar))}
.kart-ikon{
  width:52px;height:52px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.7rem;
  background:var(--panel2);border:1px solid var(--cizgi);
}
.kart-icerik{flex:1;min-width:0}
.kart-ust{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.kart-ad{
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:1.25rem;
  letter-spacing:.02em;
}
.kart-etiket{
  font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 7px;border-radius:20px;
  background:var(--kart-renk,var(--radar));color:#0c1117;
}
.kart-aciklama{color:var(--soluk);font-size:.82rem;margin-top:3px;line-height:1.4}
.kart-ok{color:var(--soluk);font-size:1.1rem;flex-shrink:0;transition:transform .14s}
.kart:hover .kart-ok{transform:translateX(3px);color:var(--metin)}

/* yükleme & hata */
.mesaj{
  text-align:center;color:var(--soluk);padding:40px 16px;font-size:.9rem;
  background:var(--panel);border:1px dashed var(--cizgi);border-radius:14px;
}

/* kurulum çubuğu */
.kur{
  display:none;align-items:center;gap:12px;margin-top:22px;
  background:var(--radar-soluk);border:1px solid rgba(53,224,140,.35);
  border-radius:12px;padding:12px 16px;font-size:.84rem;
}
.kur.goster{display:flex}
.kur button{
  margin-left:auto;flex-shrink:0;border:none;border-radius:8px;cursor:pointer;
  background:var(--radar);color:#0c1117;font-weight:700;padding:8px 16px;font-size:.84rem;
}
.kur .kapat{background:none;color:var(--soluk);font-weight:400;padding:8px 4px}

footer{
  margin-top:30px;text-align:center;color:var(--soluk);font-size:.72rem;
  border-top:1px solid var(--cizgi);padding-top:16px;
}
</style>
</head>
<body>
<div class="sarici">
  <header>
    <div class="radar" aria-hidden="true"></div>
    <div>
      <h1>ARAÇ<span>RADAR</span> HUB</h1>
      <div class="alt-baslik">Tüm araçların tek panelde</div>
    </div>
  </header>

  <div class="durum" id="durum">
    <span class="isik"></span><span id="durumYazi">Çevrimiçi</span>
    <span style="margin-left:auto" id="surumYazi"></span>
  </div>

  <nav class="kartlar" id="kartlar" aria-label="Araçlar">
    <div class="mesaj">Araçlar yükleniyor…</div>
  </nav>

  <div class="kur" id="kurCubugu">
    <span>📲 Hub'ı ana ekranına kur, uygulama gibi kullan.</span>
    <button id="kurBtn">Kur</button>
    <button class="kapat" id="kurKapat" aria-label="Kapat">✕</button>
  </div>

  <footer>AraçRadar Hub · Yeni araç eklemek için <code>tools.json</code> dosyasına satır ekle</footer>
</div>

<script>
// ---- Araç kartlarını tools.json'dan üret ----
async function araclariYukle(){
  const k = document.getElementById('kartlar');
  try{
    const r = await fetch('tools.json', {cache:'no-cache'});
    if(!r.ok) throw new Error(r.status);
    const j = await r.json();
    document.getElementById('surumYazi').textContent = 'v' + (j.surum || '1.0');
    if(!j.araclar || !j.araclar.length){
      k.innerHTML = '<div class="mesaj">Henüz araç eklenmemiş. <code>tools.json</code> içine ilk aracını ekle.</div>';
      return;
    }
    k.innerHTML = j.araclar.map(a => `
      <a class="kart" href="${a.dosya}" style="--kart-renk:${a.renk || 'var(--radar)'}">
        <div class="kart-ikon">${a.ikon || '🔧'}</div>
        <div class="kart-icerik">
          <div class="kart-ust">
            <span class="kart-ad">${a.ad}</span>
            ${a.etiket ? `<span class="kart-etiket">${a.etiket}</span>` : ''}
          </div>
          <div class="kart-aciklama">${a.aciklama || ''}</div>
        </div>
        <span class="kart-ok">→</span>
      </a>`).join('');
  }catch(e){
    k.innerHTML = '<div class="mesaj">Araç listesi yüklenemedi. <code>tools.json</code> dosyasının repoda olduğundan emin ol.</div>';
  }
}
araclariYukle();

// ---- Çevrimiçi/çevrimdışı durumu ----
function durumGuncelle(){
  const d = document.getElementById('durum');
  const y = document.getElementById('durumYazi');
  if(navigator.onLine){ d.classList.remove('cevrimdisi'); y.textContent = 'Çevrimiçi'; }
  else{ d.classList.add('cevrimdisi'); y.textContent = 'Çevrimdışı — önbellekten çalışıyor'; }
}
addEventListener('online', durumGuncelle);
addEventListener('offline', durumGuncelle);
durumGuncelle();

// ---- Service Worker ----
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ---- PWA kurulum çubuğu ----
let kurOlay = null;
const cubuk = document.getElementById('kurCubugu');
addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  kurOlay = e;
  if(localStorage.getItem('kurGizle') !== '1') cubuk.classList.add('goster');
});
document.getElementById('kurBtn').onclick = async () => {
  if(!kurOlay) return;
  kurOlay.prompt();
  await kurOlay.userChoice;
  kurOlay = null;
  cubuk.classList.remove('goster');
};
document.getElementById('kurKapat').onclick = () => {
  cubuk.classList.remove('goster');
  localStorage.setItem('kurGizle','1');
};
</script>
</body>
</html>
